services:
  frontend:
    build: ./frontend
    container_name: app_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: app_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: app_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network: